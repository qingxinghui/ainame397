services:
  web:
    build: .
    restart: always
    env_file:
      - .env
    environment:
      RUNNING_IN_DOCKER: "true"
    # 依赖数据库和 Redis 启动后再启动
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - chroma_data:/app/chroma_rag_db

  rag_worker:
    build: .
    restart: always
    command: ["python", "-m", "core.rag_worker"]
    env_file:
      - .env
    environment:
      RUNNING_IN_DOCKER: "true"
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - chroma_data:/app/chroma_rag_db

  postgres_db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql # 数据持久化，防止重启丢失
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
  redis:
    image: redis:alpine
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data # 缓存持久化
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "127.0.0.1:5672:5672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      start_period: 60s
      interval: 5s
      timeout: 5s
      retries: 30
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - web
volumes:
  mysql_data:
  postgres_data:
  redis_data:
  rabbitmq_data:
  uploads_data:
  chroma_data:
