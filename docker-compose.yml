services:
  web:
    build: .
    restart: always
    env_file:
      - .env
    # 依赖数据库和 Redis 启动后再启动
    depends_on:
      - db
      - redis
      - postgres_db
      - rabbitmq
    volumes:
      - uploads_data:/app/uploads
      - chroma_data:/app/chroma_rag_db

  rag_worker:
    build: .
    restart: always
    command: ["python", "-m", "core.rag_worker"]
    env_file:
      - .env
    depends_on:
      - rabbitmq
    volumes:
      - uploads_data:/app/uploads
      - chroma_data:/app/chroma_rag_db

  postgres_db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql # 数据持久化，防止重启丢失
  redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis_data:/data # 缓存持久化
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  uploads_data:
  chroma_data:
