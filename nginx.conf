events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream backend_api {
        server web:8000;
    }

    server {
        listen 80;
        server_name 192.168.137.128;
        charset utf-8;

        location /auth/ {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /names/ { proxy_pass http://backend_api; }
        location /knowledge/ { proxy_pass http://backend_api; }
        location /validation/ { proxy_pass http://backend_api; }
        location /community/ { proxy_pass http://backend_api; }
        location /mail/ { proxy_pass http://backend_api; }
        location /hello/ { proxy_pass http://backend_api; }
        location = /docs { proxy_pass http://backend_api; }
        location = /openapi.json { proxy_pass http://backend_api; }

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
